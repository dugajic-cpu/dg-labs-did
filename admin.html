<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DG Labs — Admin Panel</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237c6af7'/><text y='72' x='50' text-anchor='middle' font-size='55' font-family='Arial' font-weight='bold' fill='white'>DG</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0d14;
    --surface: #13172a;
    --surface2: #1a1f35;
    --border: #1e2340;
    --accent: #7c6af7;
    --accent-hover: #6a59e0;
    --text: #e8e9f0;
    --text-dim: #8b8fa8;
    --green: #4eca8b;
    --amber: #f0a854;
    --red: #f07070;
    --blue: #5ba3f5;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .header {
    max-width: 900px;
    margin: 0 auto 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 42px;
    height: 42px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 600;
    color: white;
  }

  .logo-text { line-height: 1.2; }
  .logo-name { font-size: 15px; font-weight: 600; }
  .logo-sub { font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }

  .admin-badge {
    background: rgba(240,168,84,0.15);
    border: 1px solid rgba(240,168,84,0.3);
    color: var(--amber);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
  }

  .container { max-width: 900px; margin: 0 auto; }

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
  }

  .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 600; }
  .stat-pending { color: var(--amber); }
  .stat-approved { color: var(--green); }
  .stat-rejected { color: var(--red); }
  .stat-total { color: var(--text); }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }

  .request-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 12px;
    transition: border-color 0.15s;
  }

  .request-card:hover { border-color: var(--accent); }

  .request-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .request-name { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
  .request-email { font-size: 13px; color: var(--text-dim); }

  .status-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .status-pending { background: rgba(240,168,84,0.15); color: var(--amber); border: 1px solid rgba(240,168,84,0.3); }
  .status-veriff_sent { background: rgba(91,163,245,0.15); color: var(--blue); border: 1px solid rgba(91,163,245,0.3); }
  .status-credential_issued { background: rgba(78,202,139,0.15); color: var(--green); border: 1px solid rgba(78,202,139,0.3); }
  .status-rejected { background: rgba(240,112,112,0.15); color: var(--red); border: 1px solid rgba(240,112,112,0.3); }

  .request-meta {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  .meta-item strong { color: var(--text); }

  .request-actions { display: flex; gap: 10px; flex-wrap: wrap; }

  .btn-approve {
    padding: 8px 20px;
    background: rgba(78,202,139,0.15);
    border: 1px solid rgba(78,202,139,0.4);
    border-radius: 6px;
    color: var(--green);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-approve:hover { background: rgba(78,202,139,0.25); }

  .btn-reject {
    padding: 8px 20px;
    background: rgba(240,112,112,0.1);
    border: 1px solid rgba(240,112,112,0.3);
    border-radius: 6px;
    color: var(--red);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-reject:hover { background: rgba(240,112,112,0.2); }

  .btn-approve:disabled, .btn-reject:disabled { opacity: 0.4; cursor: not-allowed; }

  .empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .empty-icon { font-size: 36px; margin-bottom: 12px; }

  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }

  .toast.show { opacity: 1; }
  .toast.success { background: rgba(78,202,139,0.15); border: 1px solid var(--green); color: var(--green); }
  .toast.error { background: rgba(240,112,112,0.1); border: 1px solid var(--red); color: var(--red); }

  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--text-dim);
  }

  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-bottom: 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .refresh-btn {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .refresh-btn:hover { border-color: var(--accent); color: var(--text); }

  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(124,106,247,0.1); }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-mark">DG</div>
    <div class="logo-text">
      <div class="logo-name">DG Labs</div>
      <div class="logo-sub">Geneva · AI · Identity · Security</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="admin-badge">Admin Panel</span>
    <button class="refresh-btn" onclick="loadRequests()">↻ Refresh</button>
  </div>
</div>

<div class="container">

  <!-- Stats -->
  <div class="stats" id="stats">
    <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value stat-pending" id="count-pending">—</div></div>
    <div class="stat-card"><div class="stat-label">Veriff Sent</div><div class="stat-value stat-approved" id="count-veriff">—</div></div>
    <div class="stat-card"><div class="stat-label">Issued</div><div class="stat-value stat-approved" id="count-issued">—</div></div>
    <div class="stat-card"><div class="stat-label">Rejected</div><div class="stat-value stat-rejected" id="count-rejected">—</div></div>
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value stat-total" id="count-total">—</div></div>
  </div>

  <!-- Filter -->
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('veriff_sent', this)">Veriff Sent</button>
    <button class="filter-btn" onclick="setFilter('credential_issued', this)">Issued</button>
    <button class="filter-btn" onclick="setFilter('rejected', this)">Rejected</button>
  </div>

  <div class="section-title">Onboarding Requests</div>
  <div id="requests-container"><div class="loading"><div class="spinner"></div><div>Loading requests...</div></div></div>

</div>

<div class="toast" id="toast"></div>

<script>
  const APPROVE_URL = 'https://dg-labs-vc-callback-fzdwg5fjb4cncgca.westeurope-01.azurewebsites.net/api/approve-request?code=REPLACE_WITH_YOUR_FUNCTION_KEY';
  const LIST_URL = 'https://dg-labs-vc-callback-fzdwg5fjb4cncgca.westeurope-01.azurewebsites.net/api/list-requests?code=REPLACE_WITH_YOUR_FUNCTION_KEY';

  let allRequests = [];
  let currentFilter = 'all';

  async function loadRequests() {
    document.getElementById('requests-container').innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading...</div></div>';

    try {
      const res = await fetch(LIST_URL);
      const data = await res.json();
      allRequests = data.requests || [];
      updateStats();
      renderRequests();
    } catch (e) {
      document.getElementById('requests-container').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div>Failed to load requests. Check your connection.</div></div>';
    }
  }

  function updateStats() {
    const counts = { pending: 0, veriff_sent: 0, credential_issued: 0, rejected: 0 };
    allRequests.forEach(r => { if (counts[r.status] !== undefined) counts[r.status]++; });
    document.getElementById('count-pending').textContent = counts.pending;
    document.getElementById('count-veriff').textContent = counts.veriff_sent;
    document.getElementById('count-issued').textContent = counts.credential_issued;
    document.getElementById('count-rejected').textContent = counts.rejected;
    document.getElementById('count-total').textContent = allRequests.length;
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderRequests();
  }

  function renderRequests() {
    const filtered = currentFilter === 'all' ? allRequests : allRequests.filter(r => r.status === currentFilter);
    const container = document.getElementById('requests-container');

    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div>No requests found.</div></div>';
      return;
    }

    container.innerHTML = filtered.map(r => `
      <div class="request-card" id="card-${r.rowKey}">
        <div class="request-header">
          <div>
            <div class="request-name">${r.firstName} ${r.lastName}</div>
            <div class="request-email">${r.email}</div>
          </div>
          <span class="status-badge status-${r.status}">${formatStatus(r.status)}</span>
        </div>
        <div class="request-meta">
          <div class="meta-item">Country <strong>${r.country}</strong></div>
          <div class="meta-item">Submitted <strong>${formatDate(r.createdAt)}</strong></div>
        </div>
        ${r.status === 'pending' ? `
        <div class="request-actions">
          <button class="btn-approve" onclick="decide('${r.email}', 'approve', '${r.rowKey}')">✓ Approve</button>
          <button class="btn-reject" onclick="decide('${r.email}', 'reject', '${r.rowKey}')">✗ Reject</button>
        </div>` : ''}
      </div>
    `).join('');
  }

  function formatStatus(status) {
    const map = { pending: 'Pending', veriff_sent: 'Veriff Sent', credential_issued: 'Issued', rejected: 'Rejected' };
    return map[status] || status;
  }

  function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  async function decide(email, decision, rowKey) {
    const card = document.getElementById('card-' + rowKey);
    const btns = card.querySelectorAll('button');
    btns.forEach(b => b.disabled = true);

    try {
      const res = await fetch(APPROVE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, decision })
      });

      const data = await res.json();

      if (data.success) {
        showToast(decision === 'approve' ? '✓ Approved — Veriff link sent' : '✗ Rejected — applicant notified', 'success');
        setTimeout(loadRequests, 1000);
      } else {
        showToast('Error: ' + (data.message || 'Something went wrong'), 'error');
        btns.forEach(b => b.disabled = false);
      }
    } catch (e) {
      showToast('Network error. Please try again.', 'error');
      btns.forEach(b => b.disabled = false);
    }
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3000);
  }

  loadRequests();
</script>
</body>
</html>
